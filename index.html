<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта метро и баров</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Карта объектов</h2>
            
            <div class="controls">
                <div class="layers">
                    <label>
                        <input type="radio" name="layer" value="stations" id="stationsBtn" checked>
                        Станции метро (Москва)
                    </label>
                    <label>
                        <input type="radio" name="layer" value="bars" id="barsBtn">
                        Бары (Вашингтон)
                    </label>
                </div>
                
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Искать по названию...">
                </div>
                
                <div class="buttons">
                    <button id="presentBtn">Запуск презентации</button>
                    <button id="stopBtn" style="display:none;">Остановить</button>
                </div>
            </div>
        </div>
        
        <div id="map"></div>
        
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="tableHeader">
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
